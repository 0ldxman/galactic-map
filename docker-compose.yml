services:
  galactic-map:
    image: ghcr.io/0ldxman/galactic-map:latest   # замени OWNER/REPO на свой (напр. ghcr.io/davidmezaku/galactic_map)
    container_name: galactic-map
    restart: unless-stopped
    networks:
      - web_network
    # No `ports:` — NPM reaches it over web_network at http://galactic-map:80

networks:
  web_network:
    external: true
